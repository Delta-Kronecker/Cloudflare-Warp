name: Cloudflare WARP Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-warp-configs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install selenium requests

    - name: Run downloader script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python warp_downloader.py

    - name: Create WireSock.zip (WG_Tunnel ကို နာမည်ပွားယူခြင်း)
      run: |
        # တကယ်လို့ script က WG_Tunnel.zip ပဲ ထုတ်ပေးတယ်ဆိုရင် WireSock အဖြစ်ပါ ပွားလိုက်မယ်
        if [ -f "WG_Tunnel.zip" ]; then
          cp WG_Tunnel.zip WireSock.zip
          echo "WireSock.zip created from WG_Tunnel.zip"
        fi

    - name: Upload Artifacts (Download ဆွဲရန်)
      uses: actions/upload-artifact@v4
      with:
        name: All-WARP-Configs
        path: "*.zip"

    - name: Commit and push zip files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Zip ဖိုင်အားလုံး (WG_Tunnel နှင့် WireSock) ကို Repo ထဲ သိမ်းမယ်
        git add *.zip 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "🔄 Update WireSock & WG configs [$(date -u)]"
          git pull --rebase
          git push
        fi
