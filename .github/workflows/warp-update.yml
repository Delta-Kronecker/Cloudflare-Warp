name: Cloudflare WARP Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  update-warp-configs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Chrome and Driver (အသစ်ထည့်ထားသည်)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: pip install selenium requests webdriver-manager

    - name: Run downloader script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python warp_downloader.py

    - name: Commit and push zip files
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        # ရှိသမျှ zip အကုန်ပေါင်းထည့်ရန်
        git add *.zip 2>/dev/null || true
        
        if git diff --staged --quiet; then
          echo "No zip files created or no changes"
        else
          git commit -m "🔄 Update WARP configs [$(date -u)]"
          git pull --rebase
          git push
        fi
